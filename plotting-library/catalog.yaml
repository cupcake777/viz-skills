data_types:
  differential_expression:
    description: 差异表达/差异分析结果
    required_columns:
    - log2FC
    - pvalue
    optional_columns:
    - gene_label
    - qvalue
    example: volcano_demo.tsv
  qtl_gwas:
    description: QTL/GWAS汇总统计
    required_columns:
    - chr
    - pos
    - pvalue
    optional_columns:
    - snp_id
    - beta
    - se
    example: manhattan_demo.tsv
  expression_matrix:
    description: 基因表达/PDUI矩阵（宽格式）
    required_columns:
    - row_id
    - sample1
    - sample2
    - '...'
    optional_columns:
    - group_annotation
    example: heatmap_demo.tsv
  apa_pattern_comparison:
    description: APA模式跨条件对比
    required_columns:
    - gene
    - PDUI_cond1
    - PDUI_cond2
    optional_columns:
    - category
    - pvalue
    - significance
    example: apa_pattern_demo.tsv
  enrichment_result:
    description: GO/KEGG富集分析结果
    required_columns:
    - term
    - pvalue
    - gene_ratio
    optional_columns:
    - count
    - category
    - qvalue
    example: enrichment_demo.tsv
  grouped_comparison:
    description: 分组数值比较
    required_columns:
    - group
    - category
    - value
    optional_columns:
    - error
    - significance_mark
    example: grouped_bar_demo.tsv
  distribution_comparison:
    description: 分布比较数据
    required_columns:
    - group
    - value
    example: box_violin_demo.tsv
  interaction_network:
    description: 节点-边关系数据
    required_columns:
    - source
    - target
    optional_columns:
    - weight
    - type
    example: network_demo.tsv
  set_intersection:
    description: 集合交集数据
    required_columns:
    - element
    - set_name
    example: upset_demo.tsv
  dimensionality_reduction:
    description: 降维结果数据
    required_columns:
    - dim1
    - dim2
    optional_columns:
    - group_label
    - point_label
    example: pca_demo.tsv
  survival_data:
    description: 生存分析数据
    required_columns:
    - time
    - event
    optional_columns:
    - group
    example: survival_demo.tsv
  classifier_performance:
    description: 分类器评估数据
    required_columns:
    - fpr
    - tpr
    optional_columns:
    - auc
    - threshold
    example: roc_demo.tsv
  multi_distribution:
    description: 多组分布数据
    required_columns:
    - group
    - value
    example: ridgeline_demo.tsv
  correlation_matrix:
    description: 相关系数矩阵
    required_columns:
    - var1
    - var2
    - correlation_coefficient
    example: correlation_heatmap_demo.tsv
  apa_pattern_flow:
    description: APA模式流转数据
    required_columns:
    - source
    - target
    - count
    example: sankey_demo.tsv
  enrichment_result_multi:
    description: 多类别富集结果
    required_columns:
    - term
    - pvalue
    - gene_ratio
    optional_columns:
    - count
    - category
    example: enrichment_circos_demo.tsv
