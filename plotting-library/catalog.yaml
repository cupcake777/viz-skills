charts:
- name: volcano
  title: 火山图
  tier: P0
  status: done
  data_type: differential_expression
  columns:
  - log2FC
  - pvalue
  - gene_label
  description: 展示基因差异表达的fold change与显著性，标注关键基因
  recommended_for:
  - RNA-seq
  - APA差异分析
  - eQTL汇总
  tags:
  - 差异表达
  - 散点
  template: templates/volcano.py
  references:
  - R2Omics
  - HiPlot
  variations:
  - gradient_volcano: 渐变配色火山图
  - multi_group_volcano: 多组对比火山图
  demo: volcano_demo.png
- name: manhattan
