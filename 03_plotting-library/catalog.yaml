  reusable_for:
  - distribution_with_points
  - repeated_measure_summary
  default_palette: okabe_ito
  best_for: Distribution comparison with full shape visibility, 2-6 groups
  not_for: More than 8 groups, large-N box plots where median/IQR suffice
- id: ridgeline
