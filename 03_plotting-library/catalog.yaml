schema_version: 3
purpose: Reusable plotting template catalog for scientific figures.
catalog_rules:
- Describe visual patterns, not project-specific topics.
- Keep template names generic and stable.
- Use examples only to clarify reuse, never to define a one-off figure.
- A chart marked `done` must point to an existing runnable template.
- A template should expose column mappings and style parameters in code.
status:
  done: Runnable R template exists in templates/.
  planned: Reusable pattern worth adding later; no template is promised.
tiers:
  P0: Core template used across many projects.
  P1: Common specialized template with broad reuse.
  P2: Niche template; add only when it can stay generic.
classification_basis:
  primary_axis: 'Analytical claim: what question the figure answers.'
  secondary_axis: 'Data shape: how the input table or matrix is structured.'
  tertiary_axis: 'Visual grammar: which reusable chart family encodes the claim.'
  claim_types:
    distribution:
      question: How are numeric values distributed across samples or groups?
      data_shapes:
      - numeric_vector
      - grouped_values
      templates:
      - box_violin
      - raincloud
      - ridgeline
      gaps:
      - ecdf_plot
    comparison:
      question: How do groups differ in summary values, paired values, or uncertainty
        intervals?
      data_shapes:
      - grouped_values
      - grouped_summary
      - estimate_interval
      templates:
      - box_violin
      - raincloud
      - grouped_bar
      - forest_plot
      gaps:
      - paired_line
      - dumbbell_plot
    trend:
      question: How does a value change across ordered time, stage, dose, or rank?
      data_shapes:
      - ordered_series
      - grouped_ordered_series
      templates:
      - stacked_area
      - line_ribbon
      gaps:
      - trajectory_heatmap
    relationship:
      question: How are two or more quantitative variables related?
      data_shapes:
      - point_table
      - pairwise_matrix
      templates:
      - correlation_heatmap
      - scatter
      gaps:
      - hexbin
      - density_scatter
      - bland_altman
    differential_signal:
      question: Which features have both large effect size and statistical evidence?
      data_shapes:
      - point_table
      - mean_difference_table
      templates:
      - volcano
      gaps:
      - ma_plot
      - rank_metric_plot
    genomic_position:
      question: Where do signals or annotations occur along genomic coordinates?
      data_shapes:
      - ordered_position_table
      - interval_table
      - regional_association_table
      templates:
      - manhattan
      - lollipop
      gaps:
      - regional_association
      - qq_plot
      - genomic_segments
      - chromosome_ideogram
    matrix_pattern:
      question: What row-by-column pattern exists across features, samples, or variables?
      data_shapes:
      - matrix
      - pairwise_matrix
      - sparse_event_matrix
      templates:
      - heatmap_clustered
      - correlation_heatmap
      - oncoplot
      gaps:
      - annotated_heatmap
      - dot_matrix
    enrichment:
      question: Which categories or terms are over-represented or ranked as important?
      data_shapes:
      - ranked_term_table
      - bipartite_links
      - ranked_curve_table
      templates:
      - enrichment_bubble
      - enrichment_circos
      gaps:
      - gsea_curve
      - enrichment_bar
      - term_gene_heatmap
    overlap:
      question: How do feature sets intersect?
      data_shapes:
      - set_membership
      templates:
      - upset_plot
      gaps:
      - venn_small_sets
    composition:
      question: What fractions or counts make up each sample, group, or ordered point?
      data_shapes:
      - composition_table
      - ordered_composition_table
      templates:
      - stacked_area
      gaps:
      - stacked_bar
      - waffle_plot
    embedding:
      question: How do samples or cells separate in low-dimensional space?
      data_shapes:
      - embedding_table
      templates:
      - pca_plot
      - umap_plot
      gaps:
      - tsne_plot
      - embedding_density
      - cluster_label_map
    flow_network:
      question: How are entities connected or how do categories move between states?
      data_shapes:
      - edge_table
      - flow_table
      - multi_stage_flow
      - weighted_pair_links
      templates:
      - network_graph
      - sankey
      gaps:
      - alluvial_plot
      - chord_plot
    model_performance:
      question: How well does a model predict or stratify outcomes?
      data_shapes:
      - classifier_curve
      - time_to_event
      - calibration_table
      templates:
      - roc_curve
      - km_survival
      - forest_plot
      gaps:
      - precision_recall_curve
      - calibration_curve
      - decision_curve
bioinformatics_coverage:
  covered_core:
  - 'Differential or association summary: volcano, Manhattan, forest.'
  - 'Matrix and clustering: clustered heatmap, correlation heatmap, sparse event matrix,
    annotated heatmap.'
  - 'Grouped distributions: box/violin, raincloud, ridgeline.'
  - 'Composition: stacked bar, ternary plot, stacked area.'
  - 'Density and histogram overlays: histogram + KDE for distribution inspection.'
  - 'Functional summaries: enrichment bubble and term-feature circos.'
  - 'Embeddings and relationships: PCA, UMAP, network, Sankey, UpSet, feature plot.'
  important_missing:
    P1:
    - id: ma_plot
      reason: Complements volcano for mean-dependent bias and differential abundance.
    - id: regional_association
      reason: Genome-wide Manhattan is not enough for locus-level interpretation.
    - id: precision_recall_curve
      reason: ROC is insufficient for imbalanced classification problems.
    P2:
    - id: genomic_segments
      reason: Needed for gene models, interval annotations, and assay tracks.
    - id: circos_plot
      reason: Useful for multi-track genome summaries, but should remain niche.
    - id: synteny_links
      reason: Comparative genomics needs paired interval links.
development_workflow:
  add_template_steps:
  - Define the analytical claim and input shape before choosing a chart.
  - Check whether an existing template can cover the claim through column mappings.
  - If not covered, add a generic planned entry before writing code.
  - Implement the smallest reusable R template with mock data and explicit parameters.
  - Render demo PDF and PNG.
  - Promote to `templates` only after template path and demo path both exist.
  promotion_checks:
  - Template name is generic, not disease-, tissue-, assay-, or project-specific.
  - Required fields describe roles such as `value`, `group`, `position`, not one dataset's
    column names.
  - The plot can be reused by at least three plausible bioinformatics analyses.
  - Style is controlled by base plotting utilities instead of local ad hoc settings.
  - Demo data exercises labels, groups, missing optional fields, and export settings.
templates:
- id: volcano
  tier: P0
  status: done
  title: Volcano plot
  template: templates/volcano.R
  demo_png: demo_fig/volcano_demo.png
  input_shape: point_table
  required_fields:
  - effect
  - p_value
  optional_fields:
  - label
  - group
  - q_value
  visual_encodings:
    x: effect
    y: -log10(p_value)
    color: significance_or_group
    label: selected_points
  reusable_for:
  - feature_screen
  - association_scan
  - differential_test
  default_palette: volcano_up_down_ns
  best_for: Differential expression, feature screening, any log2FC vs -log10(p) scatter
  not_for: Time series, distribution comparison, single-group summary
- id: manhattan
  tier: P0
  status: done
  title: Manhattan plot
  template: templates/manhattan.R
  demo_png: demo_fig/manhattan_demo.png
  input_shape: ordered_position_table
  required_fields:
  - block
  - position
  - p_value
  optional_fields:
  - label
  - group
  visual_encodings:
    x: cumulative_position
    y: -log10(p_value)
    color: block
    label: selected_points
  reusable_for:
  - genome_scan
  - ordered_feature_scan
  default_palette: gwas_significance
  best_for: Genome-wide association, QTL scans, any chromosome-position vs significance
    plot
  not_for: Without genomic coordinates, small candidate gene sets
- id: heatmap_clustered
  tier: P0
  status: done
  title: Clustered heatmap
  template: templates/heatmap_clustered.R
  demo_png: demo_fig/heatmap_demo.png
  input_shape: matrix
  required_fields:
  - row_id
  - column_id
  - value
  optional_fields:
  - row_group
  - column_group
  visual_encodings:
    x: column_id
    y: row_id
    fill: value
    annotations: row_or_column_metadata
  reusable_for:
  - matrix_pattern
  - sample_clustering
  - score_matrix
  default_palette: npg
  best_for: Expression matrices, sample clustering, any row×column score matrix
  not_for: Fewer than 5 rows or columns, 2-group comparison
- id: correlation_heatmap
  tier: P0
  status: done
  title: Correlation heatmap
  template: templates/correlation_heatmap.R
  demo_png: demo_fig/correlation_heatmap_demo.png
  input_shape: pairwise_matrix
  required_fields:
  - variable_1
  - variable_2
  - value
  optional_fields:
  - p_value
  - label
  visual_encodings:
    x: variable_1
    y: variable_2
    fill: correlation_or_similarity
    label: optional_value_text
  reusable_for:
  - correlation_matrix
  - similarity_matrix
  - distance_summary
  default_palette: roma
  best_for: Pairwise correlation matrices, similarity matrices
  not_for: Non-symmetric matrices, unclustered feature lists
- id: box_violin
  tier: P0
  status: done
  title: Box and violin plot
  template: templates/box_violin.R
  demo_png: demo_fig/box_violin_demo.png
  input_shape: grouped_values
  required_fields:
  - group
  - value
  optional_fields:
  - sample_id
  - facet
  - color_group
  visual_encodings:
    x: group
    y: value
    fill: group_or_condition
    points: observations
  reusable_for:
  - group_distribution
  - condition_comparison
  default_palette: okabe_ito
  best_for: Continuous distribution across 2-6 groups, paired or unpaired comparisons
  not_for: More than 8 groups, ordered time series, composition data
- id: raincloud
  tier: P0
  status: done
  title: Raincloud plot
  template: templates/raincloud.R
  demo_png: demo_fig/raincloud_demo.png
  input_shape: grouped_values
  required_fields:
  - group
  - value
  optional_fields:
