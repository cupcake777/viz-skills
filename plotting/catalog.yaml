charts:
- name: volcano
  title: 火山图
  data_type: differential_expression
  columns:
  - log2FC
  - pvalue
  - gene_label
  description: 展示基因差异表达的fold change与显著性，标注关键基因
  recommended_for:
  - RNA-seq
  - APA差异分析
  - eQTL汇总
  tags:
  - 差异表达
  - fold_change
  - significance
  - 散点
  template: templates/volcano.py
  references:
  - R2Omics
  - HiPlot
  variations:
  - gradient_volcano: 渐变配色火山图
  - multi_group_volcano: 多组对比火山图
  demo: volcano_demo.png
- name: manhattan
  title: Manhattan图
  data_type: qtl_gwas
  columns:
  - chr
  - pos
  - pvalue
  - snp_id
  description: GWAS/QTL全局显著性概览，突出峰值位点
  recommended_for:
  - eQTL
  - sQTL
  - apaQTL
  - GWAS
  tags:
  - QTL
  - GWAS
  - 全基因组
  - 散点
  template: templates/manhattan.py
  references:
  - R2Omics
  - HiPlot
  - qqman
  variations:
  - manhattan_highlight: 标注候选位点
  - manhattan_annotated: 带基因注释
  demo: manhattan_demo.png
- name: heatmap_clustered
  title: 聚类热图
  data_type: expression_matrix
  columns:
  - rows
  - columns
  - values
  description: 行列双向聚类的热图，展示表达模式
  recommended_for:
  - 基因表达
  - APA PDUI矩阵
  - 样本聚类
  tags:
  - 聚类
  - 表达谱
  - 矩阵
  - 热图
  template: templates/heatmap_clustered.py
  references:
  - R2Omics
  - HiPlot
  variations:
  - heatmap_annotated: 带行/列注释条
  - heatmap_circular: 圆形热图
  demo: heatmap_demo.png
- name: correlation_heatmap
  title: 相关性热图
  data_type: correlation_matrix
  columns:
  - var1
  - var2
  - correlation_coefficient
  description: 展示变量间相关系数矩阵
  recommended_for:
  - 样本相关性
  - 特征间关联
  tags:
  - 相关性
  - 矩阵
  - 热图
  template: templates/correlation_heatmap.py
  references:
  - R2Omics
  demo: correlation_heatmap_demo.png
- name: apa_pattern
  title: PDUI趋势对比图
  data_type: apa_pattern_comparison
  columns:
  - gene
  - PDUI_prenatal
  - PDUI_postnatal
  - category
  description: 展示跨条件的PDUI模式变化（gain/loss/switch等分类散点），适用于APA及类似对比分析
  recommended_for:
  - APA趋势分析
  - 发育阶段对比
  tags:
  - APA
  - 发育
  - 模式分类
  - 散点
  template: templates/apa_pattern.py
  references:
  - 自定义
  demo: apa_pattern_demo.png
- name: apa_sankey
  title: 模式流转桑基图
  data_type: apa_pattern_flow
  columns:
  - source
  - target
  - count
  description: 展示分类模式在条件间的流转关系（桑基/冲积图），不限于APA
  recommended_for:
  - APA模式转换
  - 阶段对比
  tags:
  - APA
  - 桑基图
  - 流转
  template: templates/sankey.py
  references:
  - HiPlot
  demo: sankey_demo.png
- name: enrichment_bubble
  title: 富集气泡图
  data_type: enrichment_result
  columns:
  - term
  - pvalue
  - gene_ratio
  - count
  description: 展示GO/KEGG富集分析结果
  recommended_for:
  - GO富集
  - KEGG富集
  - 功能注释
  tags:
  - 富集
  - GO
  - KEGG
  - 气泡
  template: templates/enrichment_bubble.py
  references:
  - R2Omics
  - HiPlot
  demo: enrichment_bubble_demo.png
- name: enrichment_circos
  title: 富集圈图
  data_type: enrichment_result_multi
  columns:
  - term
  - pvalue
  - gene_ratio
  - count
  - category
  description: 多类别富集结果的可视化圈图
  recommended_for:
  - 多维富集
  - GO+KEGG联动
  tags:
  - 富集
  - Circos
  - 多类
  template: templates/enrichment_circos.py
  references:
  - R2Omics
  demo: enrichment_circos_demo.png
- name: grouped_bar
  title: 分组柱状图
  data_type: grouped_comparison
  columns:
  - group
  - category
  - value
  - error
  description: 多组间数值比较，带误差线
  recommended_for:
  - 样本统计
  - 分类比较
  tags:
  - 柱状图
  - 分组
  - 比较
  template: templates/grouped_bar.py
  references:
  - R2Omics
  demo: grouped_bar_demo.png
- name: box_violin
  title: 箱线图+小提琴图
  data_type: distribution_comparison
  columns:
  - group
  - value
  description: 展示组间数值分布差异
  recommended_for:
  - PDUI分布比较
  - 表达量分布
  tags:
  - 箱线图
  - 小提琴图
  - 分布
  template: templates/box_violin.py
  references:
  - R2Omics
  demo: box_violin_demo.png
- name: ridgeline
  title: 山峦图
  data_type: multi_distribution
  columns:
  - group
  - value
  description: 多组分布的脊线图，直观比较分布形态
  recommended_for:
  - 时间序列分布
  - 多条件对比
  tags:
  - 分布
  - 山峦图
  - 趋势
  template: templates/ridgeline.py
  references:
  - R2Omics
  demo: ridgeline_demo.png
- name: network_graph
  title: 网络图
  data_type: interaction_network
  columns:
  - source
  - target
  - weight
  description: 节点-边关系可视化（基因互作、调控网络）
  recommended_for:
  - 基因调控
  - PPI
  - 共表达
  tags:
  - 网络
  - 互作
  - 调控
  template: templates/network_graph.py
  references:
  - R2Omics
  - HiPlot
  demo: network_graph_demo.png
- name: upset_plot
  title: UpSet图
  data_type: set_intersection
  columns:
  - element
  - set_membership
  description: 多集合交集可视化，替代韦恩图
  recommended_for:
  - 基因集交集
  - APA共有/特有
  tags:
  - 韦恩
  - 交集
  - 集合
  template: templates/upset_plot.py
  references:
  - R2Omics
  demo: upset_demo.png
- name: pca_plot
  title: PCA降维图
  data_type: dimensionality_reduction
  columns:
  - PC1
  - PC2
  - group_label
  description: 主成分分析二维散点图
  recommended_for:
  - 样本聚类
  - 批次效应检查
  tags:
  - PCA
  - 降维
  - 聚类
  template: templates/pca_plot.py
  references:
  - R2Omics
  - HiPlot
  demo: pca_demo.png
- name: umap_plot
  title: UMAP图
  data_type: dimensionality_reduction
  columns:
  - UMAP1
  - UMAP2
  - group_label
  description: UMAP降维可视化（单细胞常用）
  recommended_for:
  - 单细胞
  - 高维可视化
  tags:
  - UMAP
  - 降维
  - 单细胞
  template: templates/umap_plot.py
  demo: umap_demo.png
- name: km_survival
  title: KM生存曲线
  data_type: survival_data
  columns:
  - time
  - event
  - group
  description: Kaplan-Meier生存分析曲线
  recommended_for:
  - 临床预后
  - 基因分组生存
  tags:
  - 生存
  - 临床
  - KM
  template: templates/km_survival.py
  references:
  - R2Omics
  demo: km_survival_demo.png
- name: roc_curve
  title: ROC曲线
  data_type: classifier_performance
  columns:
  - fpr
  - tpr
  - auc
  description: 分类器性能评估ROC曲线
  recommended_for:
  - 诊断模型
  - 分类评估
  tags:
  - ROC
  - AUC
  - 分类
  template: templates/roc_curve.py
  references:
  - R2Omics
  demo: roc_demo.png
data_types:
  differential_expression:
    description: 差异表达/差异分析结果
    required_columns:
    - log2FC
    - pvalue
    optional_columns:
    - gene_label
    - qvalue
    example: volcano_demo.tsv
  qtl_gwas:
    description: QTL/GWAS汇总统计
    required_columns:
    - chr
    - pos
    - pvalue
    optional_columns:
    - snp_id
    - beta
    - se
    example: manhattan_demo.tsv
  expression_matrix:
    description: 基因表达/PDUI矩阵（宽格式）
    required_columns:
    - row_id
    - sample1
    - sample2
    - '...'
    optional_columns:
    - group_annotation
    example: heatmap_demo.tsv
  apa_pattern_comparison:
    description: APA模式跨条件对比
    required_columns:
    - gene
    - PDUI_cond1
    - PDUI_cond2
    optional_columns:
    - category
    - pvalue
    - significance
    example: apa_pattern_demo.tsv
  enrichment_result:
    description: GO/KEGG富集分析结果
    required_columns:
    - term
    - pvalue
    - gene_ratio
    optional_columns:
    - count
    - category
    - qvalue
    example: enrichment_demo.tsv
  grouped_comparison:
    description: 分组数值比较
    required_columns:
    - group
    - category
    - value
    optional_columns:
    - error
    - significance_mark
    example: grouped_bar_demo.tsv
  distribution_comparison:
    description: 分布比较数据
    required_columns:
    - group
    - value
    example: box_violin_demo.tsv
  interaction_network:
    description: 节点-边关系数据
    required_columns:
    - source
    - target
    optional_columns:
    - weight
    - type
    example: network_demo.tsv
  set_intersection:
    description: 集合交集数据
    required_columns:
    - element
    - set_name
    example: upset_demo.tsv
  dimensionality_reduction:
    description: 降维结果数据
    required_columns:
    - dim1
    - dim2
    optional_columns:
    - group_label
    - point_label
    example: pca_demo.tsv
  survival_data:
    description: 生存分析数据
    required_columns:
    - time
    - event
    optional_columns:
    - group
    example: survival_demo.tsv
  classifier_performance:
    description: 分类器评估数据
    required_columns:
    - fpr
    - tpr
    optional_columns:
    - auc
    - threshold
    example: roc_demo.tsv
